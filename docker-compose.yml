version: '3.8'

services:
  pdf-analysis-api:
    build: .
    ports:
      - "30006:30006"
    environment:
      - PORT=30006
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PDF_ANALYSIS_API_KEY=${PDF_ANALYSIS_API_KEY:-dev-pdf-analysis-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30006/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
